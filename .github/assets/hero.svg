<svg width="880" height="220" viewBox="0 0 880 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DFleet Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#00E676"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="880" height="220" rx="18" fill="url(#bg)"/>
  <g stroke="#00C853" stroke-width="1" opacity="0.12">
    <line x1="0" y1="55" x2="880" y2="55"/>
    <line x1="0" y1="110" x2="880" y2="110"/>
    <line x1="0" y1="165" x2="880" y2="165"/>
    <line x1="220" y1="0" x2="220" y2="220"/>
    <line x1="440" y1="0" x2="440" y2="220"/>
    <line x1="660" y1="0" x2="660" y2="220"/>
  </g>
  <polyline points="60,150 180,110 300,130 420,80 540,100 660,60 800,90" fill="none" stroke="url(#grn)" stroke-width="3" filter="url(#glow)"/>
  <g fill="#00C853" filter="url(#glow)">
    <circle cx="180" cy="110" r="4"/><circle cx="420" cy="80" r="4"/><circle cx="660" cy="60" r="4"/>
  </g>
  <text x="440" y="105" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="800" fill="#FFFFFF">DFleet</text>
  <text x="440" y="140" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" letter-spacing="6" fill="#EAEAEA">FLEET INTELLIGENCE PLATFORM</text>
</svg>
